name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/web

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod

      - name: Verify generated Go artifacts
        working-directory: apps/api
        run: go run ./scripts/check-generated.go

      - name: Test API
        working-directory: apps/api
        run: go test ./...

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check data engine formatting
        working-directory: apps/data-engine
        run: cargo fmt --check

      - name: Test data engine
        working-directory: apps/data-engine
        run: cargo test --locked

      - name: Run data engine Clippy
        working-directory: apps/data-engine
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: apps/web/package.json

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm check

      - name: Build production bundle
        run: pnpm build
